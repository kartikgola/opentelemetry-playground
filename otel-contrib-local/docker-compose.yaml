services:
  postgres:
    image: postgres:17
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_prepared_transactions=100
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d db_prod"]
      interval: 5s
      timeout: 5s
      retries: 20

  otelcol:
    build:
      context: .
      dockerfile: Dockerfile.otelcol
      additional_contexts:
        contrib: /home/kg/github.com/kartikgola/opentelemetry-collector-contrib
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --config=/etc/otelcol/config.yaml
      - --feature-gates=receiver.postgresql.connectionPool,receiver.postgresql.separateSchemaAttr
    environment:
      POSTGRESQL_PASSWORD: otelp
    ports:
      - "9464:9464"
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol/config.yaml:ro,Z

  prometheus:
    image: prom/prometheus:v3.5.0
    depends_on:
      - otelcol
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro,Z

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-datasource-prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yml:ro,Z
