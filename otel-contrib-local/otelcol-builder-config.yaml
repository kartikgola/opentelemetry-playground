dist:
  module: github.com/kartikgola/opentelemetry-playground/otelplaygroundcol
  name: otelplaygroundcol
  description: Minimal collector for local postgresqlreceiver testing.
  version: 0.1.0
  output_path: /workspace/_build/otelplaygroundcol

exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.155.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.155.0

receivers:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/postgresqlreceiver v0.155.0

replaces:
  - github.com/open-telemetry/opentelemetry-collector-contrib => /workspace/opentelemetry-collector-contrib
  - github.com/open-telemetry/opentelemetry-collector-contrib/receiver/postgresqlreceiver => /workspace/opentelemetry-collector-contrib/receiver/postgresqlreceiver
